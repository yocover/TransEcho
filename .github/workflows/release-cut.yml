name: Release Cut

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.1)"
        required: true
      branch:
        description: "Branch to release from"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  cut-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version files
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]

          package_json = pathlib.Path("package.json")
          package_data = json.loads(package_json.read_text())
          package_data["version"] = version
          package_json.write_text(json.dumps(package_data, indent=2) + "\n")

          tauri_conf = pathlib.Path("src-tauri/tauri.conf.json")
          tauri_data = json.loads(tauri_conf.read_text())
          tauri_data["version"] = version
          tauri_conf.write_text(json.dumps(tauri_data, indent=2) + "\n")

          cargo_toml = pathlib.Path("src-tauri/Cargo.toml")
          cargo_text = cargo_toml.read_text()
          cargo_text = re.sub(
              r'(?m)^version = ".*?"$',
              f'version = "{version}"',
              cargo_text,
              count=1,
          )
          cargo_toml.write_text(cargo_text)
          PY

      - name: Commit version bump
        id: commit_version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git fetch --force --tags origin
          if git rev-parse "v${VERSION}" >/dev/null 2>&1 || git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists"
            exit 1
          fi
          git tag "v${VERSION}"

      - name: Push branch and tag
        env:
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ inputs.version }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"
          if [ "${{ steps.commit_version.outputs.changed }}" = "true" ]; then
          git push origin "HEAD:${BRANCH}"
          else
            echo "Skipping branch push because there was no version change commit"
          fi
          git push origin "v${VERSION}"
